name: Build AppImage

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build with PyInstaller
        run: pyinstaller --onefile --name xcursor-generator --add-data "assets:assets" main.py

      - name: Download appimagetool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin

          # Copy your binary
          cp dist/xcursor-generator AppDir/usr/bin/

          # Copy desktop file to the root of AppDir
          cp xcursor.desktop AppDir/

          # Copy icon to the root (so it's easily found)
          cp xcursor.png AppDir/

          # Create the AppRun script
          echo '#!/bin/sh' > AppDir/AppRun
          echo 'exec "$APPDIR/usr/bin/xcursor-generator" "$@"' >> AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: ./appimagetool-x86_64.AppImage AppDir xcursor-generator.AppImage
        env:
          ARCH: x86_64
